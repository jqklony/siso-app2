name: Fix Lucide Imports
on:
  push:
    paths: ['.github/workflows/fix-lucide2.yml']

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fix missing lucide imports
        run: |
          python3 << 'SCRIPT'
          import re
          FIXES = {
            "src/pages/Agenda.jsx": ["UserCheck"],
            "src/pages/Bill.jsx": ["Printer", "Save"],
            "src/pages/Caja.jsx": ["Download"],
            "src/pages/Certificado.jsx": ["FileText", "Lock"],
            "src/pages/Companies.jsx": ["Building2"],
            "src/pages/Contabilidad.jsx": ["ChevronLeft", "Download"],
            "src/pages/Dashboard.jsx": ["AlertTriangle", "Building2", "Clock", "Eye", "FileText", "Heart", "Shield", "UserCheck", "Users"],
            "src/pages/HabeasData.jsx": ["Shield"],
            "src/pages/HistoriaGeneral.jsx": ["Loader2", "Plus", "Search"],
            "src/pages/HistoriaOcupacional.jsx": ["Loader2"],
            "src/pages/LoginPage.jsx": ["BrainCircuit"],
            "src/pages/Patients.jsx": ["Eye", "Search", "Users"],
            "src/pages/PerfilIPS.jsx": ["ChevronLeft", "Save", "Upload"],
            "src/pages/Propuestas.jsx": ["FileText", "Plus", "Printer", "Save"],
            "src/pages/Reporte.jsx": ["BrainCircuit", "FileText", "Loader2", "Printer", "ShieldCheck", "UserCheck"],
            "src/pages/SVE.jsx": ["BrainCircuit", "Loader2"],
            "src/pages/Users.jsx": ["Activity", "Lock", "Save", "Shield", "UserCheck", "UserPlus"],
            "src/pages/Verification.jsx": ["Lock", "Printer", "Search"],
          }
          for fname, new_icons in FIXES.items():
            content = open(fname, encoding="utf-8").read()
            lines = content.split("\n")
            lucide_end = -1
            lucide_start = -1
            for i, line in enumerate(lines):
              if "lucide-react" in line:
                lucide_end = i
            if lucide_end >= 0:
              for j in range(lucide_end, -1, -1):
                if "import" in lines[j] and "{" in lines[j]:
                  lucide_start = j
                  break
              if lucide_start < 0:
                lucide_start = lucide_end
              block = " ".join(lines[lucide_start:lucide_end+1])
              existing = set(re.findall(r"[A-Z][a-zA-Z0-9]+", block)) - {"from"}
              all_icons = sorted(existing | set(new_icons))
              new_block = "import { " + ", ".join(all_icons) + ' } from "lucide-react";'
              lines[lucide_start:lucide_end+1] = [new_block]
            else:
              for i, line in enumerate(lines):
                if line.startswith("import "):
                  all_icons = sorted(set(new_icons))
                  lines.insert(i+1, "import { " + ", ".join(all_icons) + ' } from "lucide-react";')
                  break
            open(fname, "w", encoding="utf-8").write("\n".join(lines))
            print("Fixed", fname)
          SCRIPT

      - name: Commit and cleanup
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add src/pages/
          git commit -m "fix: add missing Lucide icon imports to 18 files (Building2, UserCheck, BrainCircuit, etc.)"
          git rm .github/workflows/fix-lucide2.yml
          git commit -m "chore: remove fix workflow"
          git push
